name: road_security_flutter
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  supabase_flutter: ^2.5.4
  camera: ^0.11.0
  geolocator: ^11.0.0
  flutter_tts: ^4.0.2
  path_provider: ^2.1.3
  connectivity_plus: ^6.0.3
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.0
  collection: ^1.18.0
  flutter_image_compress: ^2.4.0
  tflite_flutter: ^0.11.0
  image: ^4.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
